services:
  db:
    image: postgres:15-alpine
    container_name: wishlist_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wishlist_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wishlist_password}
      POSTGRES_DB: ${POSTGRES_DB:-wishlist_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wishlist_network

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wishlist_app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wishlist_user:wishlist_password@db:5432/wishlist_db}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg://wishlist_user:wishlist_password@db:5432/wishlist_db}
      SECRET_KEY: ${SECRET_KEY:-00000000000000000000000000000000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - ./backend:/app
    networks:
      - wishlist_network

networks:
  wishlist_network:
    driver: bridge

  frontend:
    build:
      context: ./wishlist-web
      dockerfile: Dockerfile
    container_name: wishlist-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./wishlist-web:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started

volumes:
  postgres_data:
